<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor Prototype</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>NEON SURVIVOR</h1>
        <p>Survival Time: <span id="time">0</span>s</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * Neon Survivor - Functional Prototype
         * Fullscreen, Vector Math, Acceleration, Neon Aesthetics
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('time');

        let width, height, centerX, centerY;
        let enemies = [];
        let startTime = Date.now();
        let lastSpawnTime = 0;
        const spawnInterval = 500; // ms

        // Constants for Movement & Acceleration
        const MAX_SPEED = 3;
        const MIN_SPEED = 0.5;
        const MAX_ACCEL_DIST = 500;
        const PLAYER_RADIUS = 20;

        class Enemy {
            constructor() {
                // Spawn outside the visible area
                const side = Math.floor(Math.random() * 4);
                const margin = 50;

                if (side === 0) { // Top
                    this.x = Math.random() * width;
                    this.y = -margin;
                } else if (side === 1) { // Right
                    this.x = width + margin;
                    this.y = Math.random() * height;
                } else if (side === 2) { // Bottom
                    this.x = Math.random() * width;
                    this.y = height + margin;
                } else { // Left
                    this.x = -margin;
                    this.y = Math.random() * height;
                }

                this.size = 15;
                this.color = '#ff003c'; // Neon Red
                this.glow = '#ff003c';
                this.stopped = false;
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.glow;
                
                ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        const resize = () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        };

        const drawPlayer = () => {
            ctx.save();
            ctx.strokeStyle = '#00d2ff'; // Neon Blue
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00d2ff';
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        };

        const spawnEnemy = () => {
            const now = Date.now();
            if (now - lastSpawnTime > spawnInterval) {
                enemies.push(new Enemy());
                lastSpawnTime = now;
            }
        };

        const update = () => {
            spawnEnemy();
            
            // 1. Basic Movement
            enemies.forEach(enemy => {
                const dx = centerX - enemy.x;
                const dy = centerY - enemy.y;
                const distanceToPlayer = Math.sqrt(dx * dx + dy * dy);

                let speed = MIN_SPEED + (1 - Math.min(distanceToPlayer, MAX_ACCEL_DIST) / MAX_ACCEL_DIST) * (MAX_SPEED - MIN_SPEED);
                
                if (distanceToPlayer > 0) {
                    enemy.x += (dx / distanceToPlayer) * speed;
                    enemy.y += (dy / distanceToPlayer) * speed;
                }
            });

            // 2. Collision Resolution (Enemies vs Enemies)
            // Multiple passes for more stable "swarm" behavior
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < enemies.length; j++) {
                    for (let k = j + 1; k < enemies.length; k++) {
                        const e1 = enemies[j];
                        const e2 = enemies[k];
                        const dx = e1.x - e2.x;
                        const dy = e1.y - e2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = e1.size; // No overlap

                        if (dist < minDist && dist > 0) {
                            const overlap = (minDist - dist) / 2;
                            const nx = dx / dist;
                            const ny = dy / dist;
                            e1.x += nx * overlap;
                            e1.y += ny * overlap;
                            e2.x -= nx * overlap;
                            e2.y -= ny * overlap;
                        }
                    }
                }
            }

            // 3. Collision Resolution (Enemies vs Player)
            enemies.forEach(enemy => {
                const dx = enemy.x - centerX;
                const dy = enemy.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = PLAYER_RADIUS + enemy.size / 2;

                if (dist < minDist && dist > 0) {
                    enemy.x = centerX + (dx / dist) * minDist;
                    enemy.y = centerY + (dy / dist) * minDist;
                }
            });

            timeDisplay.innerText = Math.floor((Date.now() - startTime) / 1000);
        };

        const render = () => {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            drawPlayer();
            enemies.forEach(enemy => enemy.draw());
        };

        const loop = () => {
            update();
            render();
            requestAnimationFrame(loop);
        };

        window.addEventListener('resize', resize);
        resize();
        loop();

    </script>
</body>
</html>
