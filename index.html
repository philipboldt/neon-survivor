<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor Prototype</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            pointer-events: none;
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>NEON SURVIVOR</h1>
        <p>Survival Time: <span id="time">0</span>s</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * Neon Survivor - Functional Prototype
         * Fullscreen, Vector Math, Acceleration, Neon Aesthetics
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('time');

        let width, height, centerX, centerY;
        let enemies = [];
        let startTime = Date.now();
        let lastSpawnTime = 0;
        const spawnInterval = 500; // ms

        // Constants for Movement & Acceleration
        const MAX_SPEED = 3;
        const MIN_SPEED = 0.5;
        const MAX_ACCEL_DIST = 500;
        const PLAYER_RADIUS = 20;

        class Enemy {
            constructor() {
                // Spawn outside the visible area
                const side = Math.floor(Math.random() * 4);
                const margin = 50;

                if (side === 0) { // Top
                    this.x = Math.random() * width;
                    this.y = -margin;
                } else if (side === 1) { // Right
                    this.x = width + margin;
                    this.y = Math.random() * height;
                } else if (side === 2) { // Bottom
                    this.x = Math.random() * width;
                    this.y = height + margin;
                } else { // Left
                    this.x = -margin;
                    this.y = Math.random() * height;
                }

                this.size = 15;
                this.color = '#ff003c'; // Neon Red
                this.glow = '#ff003c';
                this.stopped = false;
            }

            update() {
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const distanceToPlayer = Math.sqrt(dx * dx + dy * dy);

                // 1. Movement towards center
                let speed = MIN_SPEED + (1 - Math.min(distanceToPlayer, MAX_ACCEL_DIST) / MAX_ACCEL_DIST) * (MAX_SPEED - MIN_SPEED);
                
                if (distanceToPlayer > 0) {
                    this.vx = (dx / distanceToPlayer) * speed;
                    this.vy = (dy / distanceToPlayer) * speed;
                } else {
                    this.vx = 0;
                    this.vy = 0;
                }

                // 2. Separation logic (Swarm effect / Jiggling)
                // Pushing away from other enemies to prevent overlap
                let pushX = 0;
                let pushY = 0;
                const separationDist = this.size * 1.1; // Slightly larger than size for "padding"

                for (let other of enemies) {
                    if (other === this) continue;
                    const edx = this.x - other.x;
                    const edy = this.y - other.y;
                    const distToEnemy = Math.sqrt(edx * edx + edy * edy);
                    
                    if (distToEnemy < separationDist && distToEnemy > 0) {
                        // Stronger push the closer they are
                        const force = (separationDist - distToEnemy) / separationDist;
                        pushX += (edx / distToEnemy) * force * 2;
                        pushY += (edy / distToEnemy) * force * 2;
                    }
                }

                this.x += this.vx + pushX;
                this.y += this.vy + pushY;

                // 3. Collision with player (Stay on perimeter)
                const finalDx = centerX - this.x;
                const finalDy = centerY - this.y;
                const finalDist = Math.sqrt(finalDx * finalDx + finalDy * finalDy);
                const minDist = PLAYER_RADIUS + this.size / 2;

                if (finalDist < minDist) {
                    // Push back to the perimeter
                    this.x = centerX - (finalDx / finalDist) * minDist;
                    this.y = centerY - (finalDy / finalDist) * minDist;
                }
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.glow;
                
                ctx.strokeRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        const resize = () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        };

        const drawPlayer = () => {
            ctx.save();
            ctx.strokeStyle = '#00d2ff'; // Neon Blue
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00d2ff';
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        };

        const spawnEnemy = () => {
            const now = Date.now();
            if (now - lastSpawnTime > spawnInterval) {
                enemies.push(new Enemy());
                lastSpawnTime = now;
            }
        };

        const update = () => {
            spawnEnemy();
            enemies.forEach(enemy => enemy.update());
            
            // Enemies no longer removed when they reach center to allow "piling up"

            timeDisplay.innerText = Math.floor((Date.now() - startTime) / 1000);
        };

        const render = () => {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            drawPlayer();
            enemies.forEach(enemy => enemy.draw());
        };

        const loop = () => {
            update();
            render();
            requestAnimationFrame(loop);
        };

        window.addEventListener('resize', resize);
        resize();
        loop();

    </script>
</body>
</html>
